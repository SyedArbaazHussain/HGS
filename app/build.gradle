plugins {
    id 'com.android.application'
}

android {
    namespace 'com.hyperos.gesturefix'
    compileSdk 34

    defaultConfig {
        applicationId "com.hyperos.gesturefix"
        minSdk 28
        targetSdk 34
        versionCode 1
        versionName "1.0-Release"
        resConfigs "en"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    // Try version 1.0 if 93 continues to fail
    compileOnly 'org.lsposed.lsposed:api:1.0'

    // Essential UI & File Sharing Components
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core:1.10.1'
    implementation 'androidx.core:core-ktx:1.10.1'
    
    // UI Layouts
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}